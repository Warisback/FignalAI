# FignalAI theme — neutral near-black, amber brand accent.
# Base colours here apply before any injected CSS, so the app stays on-palette
# even where custom selectors don't reach.
[theme]
base = "dark"
backgroundColor = "#0A0A0C"
secondaryBackgroundColor = "#141417"
textColor = "#F2F3F5"
primaryColor = "#E0B45C"
